server:
  http_listen_port: 9080
positions:
  filename: /tmp/positions.yaml
clients:
  - url: http://loki:3100/loki/api/v1/push
scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        target_label: container
    pipeline_stages:
      # Our services log JSON (python-json-logger) to stdout; parse it into
      # labels/fields so Grafana can filter on level/logger and trace by request_id.
      - json:
          expressions:
            level: level
            logger: logger
            request_id: request_id
            status_code: status_code
      - labels:
          level:
          logger:
