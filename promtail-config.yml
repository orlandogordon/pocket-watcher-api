server:
  http_listen_port: 9080
positions:
  filename: /tmp/positions.yaml
clients:
  - url: http://loki:3100/loki/api/v1/push
scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Docker SD prefixes names with '/', e.g. '/app-api-1' — strip it so LogQL
      # reads cleanly: {container="app-api-1"}.
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
        replacement: '${1}'
    pipeline_stages:
      # Our services log JSON (python-json-logger) to stdout; parse it into
      # labels/fields so Grafana can filter on level/logger and trace by request_id.
      - json:
          expressions:
            level: level
            logger: logger
            request_id: request_id
            status_code: status_code
      - labels:
          level:
          logger:

  # Scheduled jobs run via `docker compose exec` and write JSON to a logfile
  # (cron redirect) rather than to a container's stdout, so the docker SD above
  # can't see them — tail the file directly (#63). Labeled container=<job> so
  # Grafana's container-scoped views include them.
  - job_name: pw-cron-jobs
    static_configs:
      - targets: [localhost]
        labels:
          job: pw-cron-jobs
          container: eod_snapshot
          __path__: /var/log/pw-jobs/eod_snapshot.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            request_id: request_id
      - labels:
          level:
          logger:
